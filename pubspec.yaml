name: torrent_tracker
description: Http/Https and UDP torrent tracker/scrape Dart library. It's for implementing bittorrent client.
version: 1.4.0
repository: https://github.com/eclipseglory/torrent_tracker
issue_tracker : https://github.com/eclipseglory/torrent_tracker/issues
# Sibling deps are resolved via path, so this fork is not publishable to pub.dev.
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  dartorrent_common:
    path: ../dartorrent_common
  bencode_dart:
    path: ../bencode_dart

dev_dependencies:
  lints: ^4.0.0
  test: ^1.24.0
  torrent_model:
    path: ../torrent_model
